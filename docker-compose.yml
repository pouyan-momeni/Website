version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_secure_password}
      - POSTGRES_USER=${POSTGRES_USER:-almplatform}
      - POSTGRES_DB=${POSTGRES_DB:-almplatform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-almplatform} -d ${POSTGRES_DB:-almplatform}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    build:
      context: .
      dockerfile: docker/redis/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-almplatform}:${POSTGRES_PASSWORD:-your_secure_password}@db:5432/${POSTGRES_DB:-almplatform}
      - REDIS_URL=redis://redis:6379/0
      - APP_MODE=${APP_MODE:-develop}
    volumes:
      - ./backend:/app/backend
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-almplatform}:${POSTGRES_PASSWORD:-your_secure_password}@db:5432/${POSTGRES_DB:-almplatform}
      - REDIS_URL=redis://redis:6379/0
      - APP_MODE=${APP_MODE:-develop}
    volumes:
      - ./backend:/app/backend
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: celery -A backend.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-almplatform}:${POSTGRES_PASSWORD:-your_secure_password}@db:5432/${POSTGRES_DB:-almplatform}
      - REDIS_URL=redis://redis:6379/0
      - APP_MODE=${APP_MODE:-develop}
    volumes:
      - ./backend:/app/backend
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
    name: almplatform_pgdata
